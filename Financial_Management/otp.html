<!DOCTYPE html>

<html lang="en"><head>
<script src="https://cdn.tailwindcss.com"></script>
<script>

    async function safeJson(response) {
        const text = await response.text();
        try {
            return JSON.parse(text);
        } catch (e) {
            console.error('Non-JSON response from server:', text);
            throw new Error('Unexpected server response (HTTP ' + response.status + '). Open DevTools > Network to see the raw reply.');
        }
    }

    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    primary: '#6750A4',
                    'primary-container': '#EADDFF',
                    'primary-fixed-variant': '#4F378B',
                    'on-primary': '#FFFFFF',
                    'on-primary-container': '#21005D',
                    surface: '#FFFBFE',
                    'surface-bright': '#FFFBFE',
                    'surface-container': '#F3EDF7',
                    'surface-container-low': '#F7F2FA',
                    'surface-container-lowest': '#FFFFFF',
                    background: '#FFFBFE',
                    'on-surface': '#1C1B1F',
                    'on-surface-variant': '#49454F',
                    'on-background': '#1C1B1F',
                    outline: '#79747E',
                    'outline-variant': '#CAC4D0'
                },
                fontFamily: {
                    headline: ['Inter', 'sans-serif'],
                    body: ['Inter', 'sans-serif'],
                    label: ['Public Sans', 'sans-serif']
                }
            }
        }
    }
</script>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MFA Verification</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Public+Sans:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }
        .banner { display: none; border-radius: 0.5rem; padding: 0.75rem 1rem; font-size: 0.875rem; margin-bottom: 1.25rem; width: 100%; text-align: left; }
        .banner.show { display: block; }
        .banner.error { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
        .banner.success { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }
        .btn-spinner { display: none; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .otp-input.filled { border-color: var(--color-primary-container, #6750A4); }
        /* Guaranteed button color — doesn't depend on the Tailwind CDN
           having generated the bg-primary-container utility in time. */
        .btn-primary {
            background-color: #6750A4 !important;
            color: #FFFFFF !important;
        }
        .btn-primary:hover:not(:disabled) { background-color: #4F378B !important; }
        .btn-primary:active:not(:disabled) { background-color: #4F378B !important; }
        .btn-primary:disabled { background-color: #6750A4 !important; opacity: 0.75; cursor: not-allowed; }
    </style>
</head>
<body class="bg-surface-container-lowest flex items-center justify-center min-h-screen font-body text-on-surface antialiased p-4">
<!-- MFA Card -->
<div class="bg-surface-container-lowest w-full max-w-md p-8 rounded-xl shadow-lg border border-outline-variant/30 flex flex-col items-center text-center">
<!-- Icon -->
<div class="w-16 h-16 bg-primary-container/10 text-primary-container rounded-full flex items-center justify-center mb-6">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">shield_lock</span>
</div>
<!-- Header -->
<h2 class="text-2xl font-bold font-headline mb-2 text-on-background tracking-tight">Verify your identity</h2>
<p class="text-on-surface-variant text-sm mb-6 max-w-[280px] mx-auto leading-relaxed">
            We've sent a 6-digit verification code to <span id="email-display" class="font-medium"></span>
        </p>

<div class="banner error" id="error-banner"></div>
<div class="banner success" id="success-banner"></div>

<!-- OTP Input Form -->
<form class="w-full" id="otp-form">
<div class="flex justify-between gap-2 sm:gap-3 mb-6" id="otp-container">
<input class="otp-input w-10 h-12 sm:w-12 sm:h-14 text-center text-xl font-semibold bg-surface-container-lowest border border-outline-variant rounded-lg text-on-surface focus:border-primary-container focus:ring-2 focus:ring-primary-container focus:outline-none transition-all shadow-sm" data-index="0" inputmode="numeric" maxlength="1" pattern="[0-9]" required="" type="text"/>
<input class="otp-input w-10 h-12 sm:w-12 sm:h-14 text-center text-xl font-semibold bg-surface-container-lowest border border-outline-variant rounded-lg text-on-surface focus:border-primary-container focus:ring-2 focus:ring-primary-container focus:outline-none transition-all shadow-sm" data-index="1" inputmode="numeric" maxlength="1" pattern="[0-9]" required="" type="text"/>
<input class="otp-input w-10 h-12 sm:w-12 sm:h-14 text-center text-xl font-semibold bg-surface-container-lowest border border-outline-variant rounded-lg text-on-surface focus:border-primary-container focus:ring-2 focus:ring-primary-container focus:outline-none transition-all shadow-sm" data-index="2" inputmode="numeric" maxlength="1" pattern="[0-9]" required="" type="text"/>
<input class="otp-input w-10 h-12 sm:w-12 sm:h-14 text-center text-xl font-semibold bg-surface-container-lowest border border-outline-variant rounded-lg text-on-surface focus:border-primary-container focus:ring-2 focus:ring-primary-container focus:outline-none transition-all shadow-sm" data-index="3" inputmode="numeric" maxlength="1" pattern="[0-9]" required="" type="text"/>
<input class="otp-input w-10 h-12 sm:w-12 sm:h-14 text-center text-xl font-semibold bg-surface-container-lowest border border-outline-variant rounded-lg text-on-surface focus:border-primary-container focus:ring-2 focus:ring-primary-container focus:outline-none transition-all shadow-sm" data-index="4" inputmode="numeric" maxlength="1" pattern="[0-9]" required="" type="text"/>
<input class="otp-input w-10 h-12 sm:w-12 sm:h-14 text-center text-xl font-semibold bg-surface-container-lowest border border-outline-variant rounded-lg text-on-surface focus:border-primary-container focus:ring-2 focus:ring-primary-container focus:outline-none transition-all shadow-sm" data-index="5" inputmode="numeric" maxlength="1" pattern="[0-9]" required="" type="text"/>
</div>
<!-- Expiry info -->
<div class="flex items-center justify-center gap-1.5 text-xs text-on-surface-variant font-label mb-8">
<span class="material-symbols-outlined text-[16px]">schedule</span>
<span id="expiry-text">Code expires in 10 minutes</span>
</div>
<!-- Action Button -->
<button class="btn-primary w-full flex justify-center items-center font-medium py-3 px-4 rounded-lg shadow-sm transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-container mb-6" id="submit-btn" type="submit">
<span class="btn-spinner" id="btn-spinner"></span>
<span id="btn-text">Verify Code</span>
</button>
</form>
<!-- Resend Link -->
<p class="text-sm text-on-surface-variant">
            Didn't receive the code? 
            <button class="text-primary-container hover:text-primary font-medium hover:underline focus:outline-none transition-colors" id="resend-btn" type="button">
                Resend code
            </button>
</p>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const email = params.get('email') || '';
    const purpose = params.get('purpose') || 'register'; // 'register' or 'reset'

    document.getElementById('email-display').textContent = email;

    const inputs = Array.from(document.querySelectorAll('.otp-input'));

    inputs.forEach((input, idx) => {
        input.addEventListener('input', (e) => {
            const val = e.target.value.replace(/[^0-9]/g, '');
            e.target.value = val;
            if (val) {
                e.target.classList.add('filled');
                if (idx < inputs.length - 1) inputs[idx + 1].focus();
            } else {
                e.target.classList.remove('filled');
            }
        });

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' && !e.target.value && idx > 0) {
                inputs[idx - 1].focus();
            }
        });

        input.addEventListener('paste', (e) => {
            e.preventDefault();
            const pasted = (e.clipboardData || window.clipboardData).getData('text').replace(/[^0-9]/g, '');
            pasted.split('').slice(0, inputs.length).forEach((char, i) => {
                if (inputs[i]) {
                    inputs[i].value = char;
                    inputs[i].classList.add('filled');
                }
            });
            const nextIndex = Math.min(pasted.length, inputs.length - 1);
            inputs[nextIndex].focus();
        });
    });

    function showBanner(id, message) {
        const el = document.getElementById(id);
        el.textContent = message;
        el.classList.add('show');
    }

    function hideBanners() {
        document.getElementById('error-banner').classList.remove('show');
        document.getElementById('success-banner').classList.remove('show');
    }

    function setLoading(isLoading) {
        document.getElementById('submit-btn').disabled = isLoading;
        document.getElementById('btn-spinner').style.display = isLoading ? 'inline-block' : 'none';
        document.getElementById('btn-text').textContent = isLoading ? 'Verifying...' : 'Verify Code';
    }

    document.getElementById('otp-form').addEventListener('submit', async function (e) {
        e.preventDefault();
        hideBanners();

        const code = inputs.map(i => i.value).join('');
        if (code.length !== 6) {
            showBanner('error-banner', 'Please enter the full 6-digit code.');
            return;
        }

        setLoading(true);

        try {
            const formData = new FormData();
            formData.append('email', email);
            formData.append('purpose', purpose);
            formData.append('otp', code);

            const response = await fetch('api/verify_otp.php', {
                method: 'POST',
                body: formData
            });
            const data = await safeJson(response);

            if (data.success) {
                showBanner('success-banner', data.message);
                setTimeout(() => { window.location.href = data.redirect; }, 700);
            } else {
                showBanner('error-banner', data.message);
                setLoading(false);
            }
        } catch (err) {
            showBanner('error-banner', err.message || 'Something went wrong. Please try again.');
            setLoading(false);
        }
    });

    document.getElementById('resend-btn').addEventListener('click', async function () {
        hideBanners();
        this.disabled = true;
        this.textContent = 'Sending...';

        try {
            const formData = new FormData();
            formData.append('email', email);
            formData.append('purpose', purpose);

            const response = await fetch('api/resend_otp.php', {
                method: 'POST',
                body: formData
            });
            const data = await safeJson(response);
            showBanner(data.success ? 'success-banner' : 'error-banner', data.message);
        } catch (err) {
            showBanner('error-banner', err.message || 'Something went wrong. Please try again.');
        } finally {
            this.disabled = false;
            this.textContent = 'Resend code';
        }
    });
</script>
</body></html>
