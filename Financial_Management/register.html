<!DOCTYPE html>
<html class="light" lang="en"><head>
<script src="https://cdn.tailwindcss.com"></script>
<script>

    async function safeJson(response) {
        const text = await response.text();
        try {
            return JSON.parse(text);
        } catch (e) {
            console.error('Non-JSON response from server:', text);
            throw new Error('Unexpected server response (HTTP ' + response.status + '). Open DevTools > Network to see the raw reply.');
        }
    }

    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    primary: '#6750A4',
                    'primary-container': '#EADDFF',
                    'primary-fixed-variant': '#4F378B',
                    'on-primary': '#FFFFFF',
                    'on-primary-container': '#21005D',
                    surface: '#FFFBFE',
                    'surface-bright': '#FFFBFE',
                    'surface-container': '#F3EDF7',
                    'surface-container-low': '#F7F2FA',
                    'surface-container-lowest': '#FFFFFF',
                    background: '#FFFBFE',
                    'on-surface': '#1C1B1F',
                    'on-surface-variant': '#49454F',
                    'on-background': '#1C1B1F',
                    outline: '#79747E',
                    'outline-variant': '#CAC4D0'
                },
                fontFamily: {
                    headline: ['Inter', 'sans-serif'],
                    body: ['Inter', 'sans-serif'],
                    label: ['Public Sans', 'sans-serif']
                }
            }
        }
    }
</script>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Create Account</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;family=Public+Sans:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body { font-family: 'Inter', sans-serif; }
        .label-text { font-family: 'Public Sans', sans-serif; }
        .field-error { color: #dc2626; font-size: 0.75rem; margin-top: 0.375rem; display: none; }
        .banner { display: none; border-radius: 0.5rem; padding: 0.75rem 1rem; font-size: 0.875rem; margin-bottom: 1.25rem; }
        .banner.show { display: block; }
        .banner.error { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
        .banner.success { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }
        .btn-spinner { display: none; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        /* Guaranteed button color — doesn't depend on the Tailwind CDN
           having generated the bg-primary-container/bg-primary utility in time. */
        .btn-primary {
            background-color: #6750A4 !important;
            color: #FFFFFF !important;
        }
        .btn-primary:hover:not(:disabled) { background-color: #4F378B !important; }
        .btn-primary:active:not(:disabled) { background-color: #4F378B !important; }
        .btn-primary:disabled { background-color: #6750A4 !important; opacity: 0.75; cursor: not-allowed; }
    </style>
</head>
<body class="bg-surface-container-low min-h-screen flex items-center justify-center p-4">
<div class="w-full max-w-md bg-surface-container-lowest rounded-xl shadow-lg border border-outline-variant/30 p-8">
<div class="mb-8 text-center">
<h1 class="text-2xl font-headline font-bold text-on-surface">Create Account</h1>
<p class="text-on-surface-variant font-body text-sm mt-2">Sign up to get started.</p>
</div>

<div class="banner error" id="error-banner"></div>
<div class="banner success" id="success-banner"></div>

<form class="space-y-6" id="register-form">
<div>
<label class="block label-text text-sm font-medium text-on-surface-variant mb-1.5" for="full_name">Full Name</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-xl">person</span>
</div>
<input class="block w-full pl-10 pr-3 py-2.5 border border-outline-variant rounded-lg bg-surface-container-lowest text-on-surface placeholder-on-surface-variant/50 focus:ring-2 focus:ring-primary focus:border-primary transition-colors sm:text-sm" id="full_name" name="full_name" placeholder="Jane Doe" required="" type="text"/>
</div>
</div>

<div>
<label class="block label-text text-sm font-medium text-on-surface-variant mb-1.5" for="email">Email Address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-xl">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-2.5 border border-outline-variant rounded-lg bg-surface-container-lowest text-on-surface placeholder-on-surface-variant/50 focus:ring-2 focus:ring-primary focus:border-primary transition-colors sm:text-sm" id="email" name="email" placeholder="you@example.com" required="" type="email"/>
</div>
</div>

<div>
<label class="block label-text text-sm font-medium text-on-surface-variant mb-1.5" for="password">Password</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-xl">lock</span>
</div>
<input class="block w-full pl-10 pr-10 py-2.5 border border-outline-variant rounded-lg bg-surface-container-lowest text-on-surface placeholder-on-surface-variant/50 focus:ring-2 focus:ring-primary focus:border-primary transition-colors sm:text-sm" id="password" name="password" placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-outline hover:text-on-surface transition-colors" onclick="togglePasswordVisibility('password', this)" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
<p class="mt-1.5 text-xs text-outline">Must be at least 8 characters long.</p>
</div>

<div>
<label class="block label-text text-sm font-medium text-on-surface-variant mb-1.5" for="confirm_password">Confirm Password</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-xl">lock</span>
</div>
<input class="block w-full pl-10 pr-10 py-2.5 border border-outline-variant rounded-lg bg-surface-container-lowest text-on-surface placeholder-on-surface-variant/50 focus:ring-2 focus:ring-primary focus:border-primary transition-colors sm:text-sm" id="confirm_password" name="confirm_password" placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-outline hover:text-on-surface transition-colors" onclick="togglePasswordVisibility('confirm_password', this)" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>

<div>
<button class="btn-primary w-full flex justify-center items-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all active:scale-[0.98]" id="submit-btn" type="submit">
<span class="btn-spinner" id="btn-spinner"></span>
<span id="btn-text">Create Account</span>
</button>
</div>
</form>

<div class="mt-6 text-center text-sm text-on-surface-variant label-text">
            Already have an account?
<a class="font-medium text-primary hover:text-primary-container transition-colors" href="login.html"> Sign in</a>
</div>
</div>

<script>
    function togglePasswordVisibility(fieldId, btn) {
        const input = document.getElementById(fieldId);
        const icon = btn.querySelector('.material-symbols-outlined');
        if (input.type === 'password') {
            input.type = 'text';
            icon.textContent = 'visibility_off';
        } else {
            input.type = 'password';
            icon.textContent = 'visibility';
        }
    }

    function showBanner(id, message) {
        const el = document.getElementById(id);
        el.textContent = message;
        el.classList.add('show');
    }

    function hideBanners() {
        document.getElementById('error-banner').classList.remove('show');
        document.getElementById('success-banner').classList.remove('show');
    }

    function setLoading(isLoading) {
        document.getElementById('submit-btn').disabled = isLoading;
        document.getElementById('btn-spinner').style.display = isLoading ? 'inline-block' : 'none';
        document.getElementById('btn-text').textContent = isLoading ? 'Creating account...' : 'Create Account';
    }

    document.getElementById('register-form').addEventListener('submit', async function (e) {
        e.preventDefault();
        hideBanners();

        const formData = new FormData(this);

        if (formData.get('password') !== formData.get('confirm_password')) {
            showBanner('error-banner', 'Passwords do not match.');
            return;
        }

        setLoading(true);
        try {
            const response = await fetch('api/register.php', {
                method: 'POST',
                body: formData
            });
            const data = await safeJson(response);

            if (data.success) {
                showBanner('success-banner', data.message);
                setTimeout(() => { window.location.href = data.redirect; }, 800);
            } else {
                showBanner('error-banner', data.message);
                setLoading(false);
            }
        } catch (err) {
            showBanner('error-banner', err.message || 'Something went wrong. Please try again.');
            setLoading(false);
        }
    });
</script>
</body></html>
