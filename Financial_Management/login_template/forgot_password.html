<!DOCTYPE html>

<html lang="en"><head>
<script src="https://cdn.tailwindcss.com"></script>
<script>

    async function safeJson(response) {
        const text = await response.text();
        try {
            return JSON.parse(text);
        } catch (e) {
            console.error('Non-JSON response from server:', text);
            throw new Error('Unexpected server response (HTTP ' + response.status + '). Open DevTools > Network to see the raw reply.');
        }
    }

    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    primary: '#6750A4',
                    'primary-container': '#EADDFF',
                    'primary-fixed-variant': '#4F378B',
                    'on-primary': '#FFFFFF',
                    'on-primary-container': '#21005D',
                    surface: '#FFFBFE',
                    'surface-bright': '#FFFBFE',
                    'surface-container': '#F3EDF7',
                    'surface-container-low': '#F7F2FA',
                    'surface-container-lowest': '#FFFFFF',
                    background: '#FFFBFE',
                    'on-surface': '#1C1B1F',
                    'on-surface-variant': '#49454F',
                    'on-background': '#1C1B1F',
                    outline: '#79747E',
                    'outline-variant': '#CAC4D0'
                },
                fontFamily: {
                    headline: ['Inter', 'sans-serif'],
                    body: ['Inter', 'sans-serif'],
                    label: ['Public Sans', 'sans-serif']
                }
            }
        }
    }
</script>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Forgot Password</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;family=Public+Sans:wght@400;500;600;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .banner { display: none; border-radius: 0.5rem; padding: 0.75rem 1rem; font-size: 0.875rem; margin-bottom: 1.25rem; }
        .banner.show { display: block; }
        .banner.error { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
        .banner.success { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }
        .btn-spinner { display: none; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-surface-container-low min-h-screen flex items-center justify-center p-4 font-body text-on-surface antialiased">
<!-- Forgot Password Card -->
<main class="w-full max-w-md bg-surface-container-lowest rounded-xl shadow-lg border border-outline-variant/30 p-8 sm:p-10 transition-all duration-300 hover:shadow-xl">
<!-- Header -->
<div class="mb-8 text-center sm:text-left">
<h1 class="font-headline text-2xl font-bold tracking-tight text-on-surface mb-3">Forgot your password?</h1>
<p class="text-on-surface-variant text-sm leading-relaxed">
                No problem. Just let us know your email address and we will email you a verification code that will allow you to choose a new one.
            </p>
</div>

<div class="banner error" id="error-banner"></div>
<div class="banner success" id="success-banner"></div>

<!-- Form -->
<form class="space-y-6" id="forgot-form">
<!-- Email Input -->
<div class="space-y-2">
<label class="block font-label text-sm font-semibold text-on-surface" for="email">Email</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-xl">mail</span>
</div>
<input autofocus="" class="block w-full pl-10 pr-3 py-2.5 border border-outline-variant rounded-lg bg-surface-bright text-on-surface placeholder:text-outline-variant focus:ring-2 focus:ring-primary-container focus:border-primary-container sm:text-sm transition-shadow duration-200" id="email" name="email" placeholder="you@example.com" required="" type="email"/>
</div>
</div>
<!-- Submit Button -->
<div>
<button class="w-full flex justify-center items-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-semibold text-on-primary bg-primary-container hover:bg-primary focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-container transition-colors duration-200 active:scale-[0.98]" id="submit-btn" type="submit">
<span class="btn-spinner" id="btn-spinner"></span>
<span id="btn-text">Email Verification Code</span>
</button>
</div>
</form>
<!-- Footer / Back Link -->
<div class="mt-8 text-center">
<a class="inline-flex items-center justify-center font-label text-sm font-medium text-primary hover:text-primary-container transition-colors duration-200 group" href="login.html">
<span class="material-symbols-outlined text-lg mr-1 group-hover:-translate-x-1 transition-transform duration-200">arrow_back</span>
                Back to login
            </a>
</div>
</main>

<script>
    function showBanner(id, message) {
        const el = document.getElementById(id);
        el.textContent = message;
        el.classList.add('show');
    }

    function hideBanners() {
        document.getElementById('error-banner').classList.remove('show');
        document.getElementById('success-banner').classList.remove('show');
    }

    function setLoading(isLoading) {
        document.getElementById('submit-btn').disabled = isLoading;
        document.getElementById('btn-spinner').style.display = isLoading ? 'inline-block' : 'none';
        document.getElementById('btn-text').textContent = isLoading ? 'Sending...' : 'Email Verification Code';
    }

    document.getElementById('forgot-form').addEventListener('submit', async function (e) {
        e.preventDefault();
        hideBanners();
        setLoading(true);

        const formData = new FormData(this);

        try {
            const response = await fetch('api/forgot_password.php', {
                method: 'POST',
                body: formData
            });
            const data = await safeJson(response);

            if (data.success) {
                showBanner('success-banner', data.message);
                setTimeout(() => { window.location.href = data.redirect; }, 900);
            } else {
                showBanner('error-banner', data.message);
                setLoading(false);
            }
        } catch (err) {
            showBanner('error-banner', err.message || 'Something went wrong. Please try again.');
            setLoading(false);
        }
    });
</script>
</body></html>
