<!DOCTYPE html>

<html lang="en"><head>
<script src="https://cdn.tailwindcss.com"></script>
<script>

    async function safeJson(response) {
        const text = await response.text();
        try {
            return JSON.parse(text);
        } catch (e) {
            console.error('Non-JSON response from server:', text);
            throw new Error('Unexpected server response (HTTP ' + response.status + '). Open DevTools > Network to see the raw reply.');
        }
    }

    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    primary: '#6750A4',
                    'primary-container': '#EADDFF',
                    'primary-fixed-variant': '#4F378B',
                    'on-primary': '#FFFFFF',
                    'on-primary-container': '#21005D',
                    surface: '#FFFBFE',
                    'surface-bright': '#FFFBFE',
                    'surface-container': '#F3EDF7',
                    'surface-container-low': '#F7F2FA',
                    'surface-container-lowest': '#FFFFFF',
                    background: '#FFFBFE',
                    'on-surface': '#1C1B1F',
                    'on-surface-variant': '#49454F',
                    'on-background': '#1C1B1F',
                    outline: '#79747E',
                    'outline-variant': '#CAC4D0'
                },
                fontFamily: {
                    headline: ['Inter', 'sans-serif'],
                    body: ['Inter', 'sans-serif'],
                    label: ['Public Sans', 'sans-serif']
                }
            }
        }
    }
</script>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Reset Password Component</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;family=Public+Sans:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .banner { display: none; border-radius: 0.5rem; padding: 0.75rem 1rem; font-size: 0.875rem; margin-bottom: 1.25rem; }
        .banner.show { display: block; }
        .banner.error { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
        .banner.success { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }
        .btn-spinner { display: none; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        /* Guaranteed button color — doesn't depend on the Tailwind CDN
           having generated the bg-primary-container/bg-primary utility in time. */
        .btn-primary {
            background-color: #6750A4 !important;
            color: #FFFFFF !important;
        }
        .btn-primary:hover:not(:disabled) { background-color: #4F378B !important; }
        .btn-primary:active:not(:disabled) { background-color: #4F378B !important; }
        .btn-primary:disabled { background-color: #6750A4 !important; opacity: 0.75; cursor: not-allowed; }
    </style>
</head>
<body class="font-body bg-surface-container text-on-surface antialiased min-h-screen flex items-center justify-center p-4 sm:p-8">
<main class="w-full max-w-md">
<!-- Reset Password Card -->
<div class="bg-surface-container-lowest rounded-xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-outline-variant/30 p-8 sm:p-10">
<div class="mb-8 text-center">
<div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-primary-container/10 text-primary-container mb-4">
<span class="material-symbols-outlined text-2xl" data-icon="lock_reset">lock_reset</span>
</div>
<h1 class="font-headline text-2xl font-bold text-on-surface tracking-tight mb-2">Reset Password</h1>
<p class="text-on-surface-variant text-sm">Please enter your new password below to regain access to your account.</p>
</div>

<div class="banner error" id="error-banner"></div>
<div class="banner success" id="success-banner"></div>

<form class="space-y-5" id="reset-form">
<!-- Email Field (Read-only/Prefilled) -->
<div>
<label class="block text-sm font-medium text-on-surface-variant mb-1.5" for="email">Email Address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]" data-icon="mail">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-2.5 bg-surface border border-outline-variant rounded-lg text-on-surface text-sm focus:ring-0 focus:border-outline-variant opacity-70 cursor-not-allowed transition-colors" id="email" name="email" readonly="" type="email"/>
</div>
</div>
<!-- New Password Field -->
<div>
<label class="block text-sm font-medium text-on-surface-variant mb-1.5" for="new-password">New Password</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]" data-icon="lock">lock</span>
</div>
<input class="block w-full pl-10 pr-10 py-2.5 bg-surface border border-outline-variant rounded-lg text-on-surface text-sm focus:ring-2 focus:ring-primary-container/20 focus:border-primary-container transition-all outline-none" id="new-password" name="new_password" placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-outline hover:text-on-surface focus:outline-none transition-colors" onclick="togglePassword('new-password', 'toggle-icon-1')" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility_off" id="toggle-icon-1">visibility_off</span>
</button>
</div>
<p class="mt-1.5 text-xs text-outline">Must be at least 8 characters long.</p>
</div>
<!-- Confirm Password Field -->
<div>
<label class="block text-sm font-medium text-on-surface-variant mb-1.5" for="confirm-password">Confirm Password</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]" data-icon="lock_check">lock_clock</span>
</div>
<input class="block w-full pl-10 pr-3 py-2.5 bg-surface border border-outline-variant rounded-lg text-on-surface text-sm focus:ring-2 focus:ring-primary-container/20 focus:border-primary-container transition-all outline-none" id="confirm-password" name="confirm_password" placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;" required="" type="password"/>
</div>
</div>
<!-- Submit Button -->
<div class="pt-2">
<button class="btn-primary w-full flex justify-center items-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-container transition-all duration-200" id="submit-btn" type="submit">
<span class="btn-spinner" id="btn-spinner"></span>
<span id="btn-text">Update Password</span>
</button>
</div>
</form>
<div class="mt-6 text-center">
<a class="text-sm font-medium text-primary-container hover:text-primary transition-colors flex items-center justify-center gap-1" href="login.html">
<span class="material-symbols-outlined text-[18px]" data-icon="arrow_back">arrow_back</span>
                    Back to login
                </a>
</div>
</div>
</main>

<script>
    const params = new URLSearchParams(window.location.search);
    const email = params.get('email') || '';
    document.getElementById('email').value = email;

    function togglePassword(fieldId, iconId) {
        const input = document.getElementById(fieldId);
        const icon = document.getElementById(iconId);
        if (input.type === 'password') {
            input.type = 'text';
            icon.textContent = 'visibility';
        } else {
            input.type = 'password';
            icon.textContent = 'visibility_off';
        }
    }

    function showBanner(id, message) {
        const el = document.getElementById(id);
        el.textContent = message;
        el.classList.add('show');
    }

    function hideBanners() {
        document.getElementById('error-banner').classList.remove('show');
        document.getElementById('success-banner').classList.remove('show');
    }

    function setLoading(isLoading) {
        document.getElementById('submit-btn').disabled = isLoading;
        document.getElementById('btn-spinner').style.display = isLoading ? 'inline-block' : 'none';
        document.getElementById('btn-text').textContent = isLoading ? 'Updating...' : 'Update Password';
    }

    document.getElementById('reset-form').addEventListener('submit', async function (e) {
        e.preventDefault();
        hideBanners();

        const formData = new FormData(this);

        if (formData.get('new_password') !== formData.get('confirm_password')) {
            showBanner('error-banner', 'Passwords do not match.');
            return;
        }

        setLoading(true);

        try {
            const response = await fetch('api/reset_password.php', {
                method: 'POST',
                body: formData
            });
            const data = await safeJson(response);

            if (data.success) {
                showBanner('success-banner', data.message);
                setTimeout(() => { window.location.href = data.redirect; }, 800);
            } else {
                showBanner('error-banner', data.message);
                setLoading(false);
            }
        } catch (err) {
            showBanner('error-banner', err.message || 'Something went wrong. Please try again.');
            setLoading(false);
        }
    });
</script>
</body></html>
